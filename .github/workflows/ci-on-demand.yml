name: CI On Demand

on:
  push:
    branches-ignore: [main, release, develop]

jobs:
  test:
    name: Build & Test
    if: contains(github.event.head_commit.message, '[ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: pytest -v
