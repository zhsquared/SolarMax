name: Hotfix Fan-out

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  fanout:
    if: contains(github.event.head_commit.message, '[hotfix]')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [develop, release]
    steps:
      - name: Open PR from main into ${{ matrix.target }} (if missing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ matrix.target }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          existing=$(gh pr list --repo "$REPO" --state open --head main --base "$TARGET" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR from main into $TARGET already open (#$existing); skipping."
            exit 0
          fi
          gh pr create \
            --repo "$REPO" \
            --base "$TARGET" \
            --head main \
            --title "Hotfix fan-out: main -> ${TARGET}" \
            --body "Detected \`[hotfix]\` marker on commit \`${SHA}\`. Opening PR to bring \`main\` into \`${TARGET}\` so the fix propagates."
