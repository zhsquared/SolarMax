; SolarMax — Single-Axis Solar Tracker
; Board: ESP32 DevKit V1

; ── Real hardware ─────────────────────────────────────────────────────────────
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_ignore = arduino_compat   ; native-only Arduino shim — never on real ESP32
lib_deps =
    adafruit/RTClib @ ^2.1.1

; ── Native simulation (runs on your Mac — no hardware needed) ────────────────
; Command: pio run -e simulate
; Simulated day runs at 120x real time (~12 real minutes per full day).
; Wind storm injected 2–4 PM local to exercise stow/resume logic.
[env:simulate]
platform = native
build_flags = -DSIMULATE -DNATIVE_SIM -DTRACKING_INTERVAL_MS=2000UL
build_src_filter = -<*> +<main.cpp> +<hal_sim.cpp> +<sim_runner.cpp> +<diagnostics.cpp>

; ── ESP32 simulation (flash to ESP32, watch Serial Monitor at 115200) ────────
; Command: pio run -e simulate_hw --target upload && pio device monitor
[env:simulate_hw]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DSIMULATE
lib_ignore = arduino_compat
lib_deps =
    adafruit/RTClib @ ^2.1.1

; ── Hardware bring-up (flash to real ESP32 to validate each sensor) ──────────
; Command: pio run -e bringup --target upload && pio device monitor
; Serial menu lets you test the RTC, pot, limit switches, and anemometer
; individually on the hardware you have on hand. See src/bringup.cpp.
[env:bringup]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DBRINGUP
build_src_filter = -<*> +<bringup.cpp>
lib_ignore = arduino_compat   ; raw Wire/ADC reads only — no RTClib needed

; ── Native unit tests (run on your Mac, no ESP32 needed) ─────────────────────
; Command: pio test -e native
; Only compiles solar_position.cpp alongside the tests (pure math, no hardware).
[env:native]
platform = native
build_flags = -DNATIVE_BUILD
build_src_filter = -<*>
