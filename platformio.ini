; SolarMax — Single-Axis Solar Tracker
; Board: ESP32 DevKit V1

; ── Real hardware ─────────────────────────────────────────────────────────────
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/RTClib @ ^2.1.1

; ── ESP32 simulation (no physical sensors — shows full state machine on Serial)
; Flash this to your ESP32 and watch Serial Monitor at 115200 baud.
; Simulated day runs at 120x real time (~12 real minutes per day).
; Wind storm injected 2–4 PM local to test stow/resume logic.
[env:simulate]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DSIMULATE
lib_deps =
    adafruit/RTClib @ ^2.1.1

; ── Native unit tests (run on your Mac, no ESP32 needed) ─────────────────────
; Command: pio test -e native
; Only compiles solar_position.cpp alongside the tests (pure math, no hardware).
[env:native]
platform = native
build_flags = -DNATIVE_BUILD -I src
build_src_filter = -<*>
